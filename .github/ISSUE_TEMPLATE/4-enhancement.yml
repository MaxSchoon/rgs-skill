name: ✨ Enhancement
description: Propose new content, a new reference, or a structural improvement.
title: "[enhancement] "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Why does it help RGS bookkeeping?
      description: Who benefits, and how. If it adds factual content, note the primary source you'd cite.
    validations:
      required: true
  - type: checkboxes
    id: coc
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct.
          required: true
