version: 2
updates:
  # Keep the SHA-pinned GitHub Actions current (Dependabot bumps the SHA and the
  # trailing version comment together, which is what makes SHA-pinning maintainable).
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "ci"
